  </g>

  <!-- Circle-check cutout centered in bulb globe -->
  <circle cx="256" cy="193" r="60" fill="url(#bg)"/>
  <path d="M232 193 L250 213 L284 171" fill="none" stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
