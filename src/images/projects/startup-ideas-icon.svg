<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>

    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.28">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Glow -->
  <ellipse cx="256" cy="210" rx="150" ry="150" fill="url(#glow)"/>

  <!-- Heroicons bulb: globe only, neck removed, bottom closed with a curve -->
  <g transform="translate(256, 256) scale(18) translate(-12, -12.5)">
    <path fill="white" d="M12 .75a8.25 8.25 0 0 0-4.135 15.39q4.135 1.8 8.27 0A8.25 8.25 0 0 0 12 .75Z"/>
