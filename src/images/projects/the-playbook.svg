<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628" />
      <stop offset="100%" stop-color="#0F1F38" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="40" />
    </filter>
    <radialGradient id="greenGlow" cx="512" cy="420" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E676" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#00E676" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)" />

  <!-- Subtle hashmark lines -->
  <line x1="100" y1="256" x2="924" y2="256" stroke="white" stroke-opacity="0.02" stroke-width="1.5" />
  <line x1="100" y1="426" x2="924" y2="426" stroke="white" stroke-opacity="0.02" stroke-width="1.5" />
  <line x1="100" y1="596" x2="924" y2="596" stroke="white" stroke-opacity="0.02" stroke-width="1.5" />
  <line x1="100" y1="766" x2="924" y2="766" stroke="white" stroke-opacity="0.02" stroke-width="1.5" />

  <!-- Subtle center circle -->
  <circle cx="512" cy="512" r="140" stroke="white" stroke-opacity="0.03" stroke-width="2" fill="none" />

  <!-- Signal Green glow behind routes -->
  <circle cx="512" cy="420" r="200" fill="url(#greenGlow)" filter="url(#glow)" />

  <!-- Line of scrimmage -->
  <line x1="300" y1="520" x2="724" y2="520" stroke="#00E676" stroke-opacity="0.4" stroke-width="4" />

  <!-- Route lines -->
  <path d="M420,520 L420,440 L340,340" stroke="#00E676" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M512,520 L512,280" stroke="#00E676" stroke-width="7" stroke-linecap="round" fill="none" />
  <path d="M604,520 L604,400 L680,360" stroke="#00E676" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Route endpoint circles -->
  <circle cx="340" cy="340" r="8" fill="#00E676" />
  <circle cx="512" cy="280" r="8" fill="#00E676" />
  <circle cx="680" cy="360" r="8" fill="#00E676" />

  <!-- Player dots on line of scrimmage -->
  <circle cx="340" cy="520" r="14" fill="#00E676" />
  <circle cx="420" cy="520" r="14" fill="#00E676" />
  <circle cx="512" cy="520" r="14" fill="#00E676" />
  <circle cx="604" cy="520" r="14" fill="#00E676" />
  <circle cx="684" cy="520" r="14" fill="#00E676" />

  <!-- Audible Gold 4-point star -->
  <path d="M512,260 L516,268 L522,270 L516,272 L512,280 L508,272 L502,270 L508,268 Z" fill="#FFB800" />
</svg>
