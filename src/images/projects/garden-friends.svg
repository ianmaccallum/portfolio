<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#73E021"/>
      <stop offset="60%" stop-color="#58CC02"/>
      <stop offset="100%" stop-color="#3E8F02"/>
    </linearGradient>

    <linearGradient id="leafGrad" x1="0.2" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8FFC9"/>
      <stop offset="55%" stop-color="#B6E388"/>
      <stop offset="100%" stop-color="#7FD43E"/>
    </linearGradient>

    <linearGradient id="budGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CFFF8C"/>
      <stop offset="50%" stop-color="#8EE132"/>
      <stop offset="100%" stop-color="#5EB314"/>
    </linearGradient>

    <linearGradient id="potGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C57545"/>
      <stop offset="100%" stop-color="#8A4E28"/>
    </linearGradient>

    <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8EE132"/>
      <stop offset="100%" stop-color="#3E8F02"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="14"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="leafShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dy="8"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft sunspots for warmth -->
  <circle cx="512" cy="480" r="420" fill="#FFFFFF" opacity="0.07"/>
  <circle cx="512" cy="480" r="280" fill="#FFFFFF" opacity="0.07"/>

  <!-- Pot with soil -->
  <g filter="url(#softShadow)">
    <path d="M 388 864 L 410 735 L 614 735 L 636 864 Z" fill="url(#potGrad)"/>
    <rect x="378" y="718" width="268" height="26" rx="6" fill="#DDA074"/>
    <rect x="378" y="738" width="268" height="10" rx="3" fill="#6F3A1E" opacity="0.35"/>
    <ellipse cx="512" cy="730" rx="118" ry="14" fill="#3A2410"/>
  </g>

  <!-- Main stem -->
  <path d="M 512 730 C 504 650, 520 590, 512 536"
        stroke="url(#stemGrad)" stroke-width="42"
        stroke-linecap="round" fill="none"
        filter="url(#softShadow)"/>

  <!-- Left leaf -->
  <g filter="url(#leafShadow)">
    <path d="M 492 498
             C 360 488, 260 418, 232 316
             C 336 292, 440 354, 508 458
             Z"
          fill="url(#leafGrad)"/>
    <path d="M 496 490 C 410 450, 340 380, 280 330"
          stroke="#3E8F02" stroke-width="6" fill="none" opacity="0.35"
          stroke-linecap="round"/>
  </g>

  <!-- Right leaf -->
  <g filter="url(#leafShadow)">
    <path d="M 532 458
             C 600 354, 704 292, 808 316
             C 780 418, 680 488, 548 498
             Z"
          fill="url(#leafGrad)"/>
    <path d="M 528 490 C 614 450, 684 380, 744 330"
          stroke="#3E8F02" stroke-width="6" fill="none" opacity="0.35"
          stroke-linecap="round"/>
  </g>

  <!-- Central bud / head -->
  <g filter="url(#softShadow)">
    <ellipse cx="512" cy="498" rx="102" ry="108" fill="url(#budGrad)"/>
    <ellipse cx="478" cy="452" rx="34" ry="22" fill="#FFFFFF" opacity="0.4"/>
  </g>

  <!-- Face -->
  <circle cx="458" cy="518" r="18" fill="#FF8F8F" opacity="0.7"/>
  <circle cx="566" cy="518" r="18" fill="#FF8F8F" opacity="0.7"/>
  <ellipse cx="480" cy="490" rx="12" ry="16" fill="#2A1A0A"/>
  <ellipse cx="544" cy="490" rx="12" ry="16" fill="#2A1A0A"/>
  <circle cx="484" cy="484" r="5" fill="#FFFFFF"/>
  <circle cx="548" cy="484" r="5" fill="#FFFFFF"/>
  <path d="M 482 542 Q 512 568 542 542"
        stroke="#2A1A0A" stroke-width="7" stroke-linecap="round" fill="none"/>
</svg>
